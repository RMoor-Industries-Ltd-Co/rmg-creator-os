# Secret-scanning safety net — runs the gitleaks CLI on every push and PR so a
# secret committed without the local pre-commit hook is still caught in CI.
# Uses the free open-source binary directly (the gitleaks-action wrapper requires
# a paid license for org repos). Policy: rmg-piaar-system secrets-protection.md
name: gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the scan is complete
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose
