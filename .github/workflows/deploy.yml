name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"
  workflow_run:
    workflows: ["Publish Images"]
    types:
      - completed

concurrency:
  group: deploy-control
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: control
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set deploy vars
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="${FULL_SHA:0:7}"
          else
            TAG="${{ github.event.inputs.image_tag }}"
            [ -z "$TAG" ] && TAG="latest"
          fi
          echo "prefix=ghcr.io/$OWNER_LC/rmg-creator-os" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Copy compose, Caddyfile, and deploy script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CONTROL_HOST }}
          username: ${{ secrets.CONTROL_USER }}
          key: ${{ secrets.CONTROL_SSH_KEY }}
          source: "infra/control-server/docker-compose.yml,infra/control-server/Caddyfile,infra/control-server/deploy.sh"
          target: /opt/rmg-creator-os/control-server
          strip_components: 2

      - name: Install local dev SSH key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTROL_HOST }}
          username: ${{ secrets.CONTROL_USER }}
          key: ${{ secrets.CONTROL_SSH_KEY }}
          script: |
            PUB="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJYDzgpCHR+7Uob1pNSiLLAkGpsU9zWDaRtUahAqOJhX blackmac@control-20260616"
            grep -qF "$PUB" ~/.ssh/authorized_keys 2>/dev/null || echo "$PUB" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys

      - name: Inject API keys into server .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTROL_HOST }}
          username: ${{ secrets.CONTROL_USER }}
          key: ${{ secrets.CONTROL_SSH_KEY }}
          script: |
            ENV_FILE="/opt/rmg-creator-os/control-server/.env"
            upsert() {
              local key="$1" val="$2"
              if [ -z "$val" ]; then return; fi
              if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }
            upsert POSTGRES_PASSWORD "${{ secrets.POSTGRES_PASSWORD }}"
            upsert REDIS_PASSWORD "${{ secrets.REDIS_PASSWORD }}"
            upsert TAILSCALE_IP "${{ secrets.TAILSCALE_IP }}"
            upsert HEYGEN_API_KEY "${{ secrets.HEYGEN_API_KEY }}"
            upsert ELEVENLABS_API_KEY "${{ secrets.ELEVENLABS_API_KEY }}"
            upsert GDRIVE_CLIENT_ID "${{ secrets.GDRIVE_CLIENT_ID }}"
            upsert GDRIVE_CLIENT_SECRET "${{ secrets.GDRIVE_CLIENT_SECRET }}"
            upsert GDRIVE_REFRESH_TOKEN "${{ secrets.GDRIVE_REFRESH_TOKEN }}"
            upsert GDRIVE_VIDEO_FOLDER_ID "${{ secrets.GDRIVE_VIDEO_FOLDER_ID }}"
            upsert GDRIVE_IMAGE_FOLDER_ID "${{ secrets.GDRIVE_IMAGE_FOLDER_ID }}"
            upsert GDRIVE_AUDIO_FOLDER_ID "${{ secrets.GDRIVE_AUDIO_FOLDER_ID }}"
            upsert GDRIVE_BROLL_FOLDER_ID "${{ secrets.GDRIVE_BROLL_FOLDER_ID }}"
            upsert GDRIVE_PROMPTS_FOLDER_ID "${{ secrets.GDRIVE_PROMPTS_FOLDER_ID }}"
            upsert GDRIVE_PERSONA_PROMPTS_FOLDER_ID "${{ secrets.GDRIVE_PERSONA_PROMPTS_FOLDER_ID }}"
            upsert ALLEN_API_KEY "${{ secrets.ALLEN_API_KEY }}"
            upsert ANTHROPIC_API_KEY "${{ secrets.ANTHROPIC_API_KEY }}"
            upsert ALLEN_VOICE_ID "${{ secrets.ALLEN_VOICE_ID }}"
            upsert OPENAI_API_KEY "${{ secrets.OPENAI_API_KEY }}"
            upsert PEXELS_API_KEY "${{ secrets.PEXELS_API_KEY }}"
            upsert PIXABAY_API_KEY "${{ secrets.PIXABAY_API_KEY }}"
            upsert GOOGLE_CLIENT_ID "${{ secrets.GOOGLE_CLIENT_ID }}"
            upsert AUTH_ALLOWED_EMAIL "${{ secrets.AUTH_ALLOWED_EMAIL }}"
            upsert COOKIE_SECRET "${{ secrets.COOKIE_SECRET }}"
            upsert PUBLIC_API_BASE "${{ secrets.PUBLIC_API_BASE }}"
            upsert AUTH_ENABLED "${{ secrets.AUTH_ENABLED }}"
            upsert POSTIZ_API_KEY "${{ secrets.POSTIZ_API_KEY }}"
            upsert YOUTUBE_API_KEY "${{ secrets.YOUTUBE_API_KEY }}"
            upsert HIGGSFIELD_ENABLED "true"

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTROL_HOST }}
          username: ${{ secrets.CONTROL_USER }}
          key: ${{ secrets.CONTROL_SSH_KEY }}
          script: |
            cd /opt/rmg-creator-os/control-server
            chmod +x deploy.sh
            DEPLOY_DIR="/opt/rmg-creator-os/control-server" \
            GHCR_IMAGE_PREFIX="${{ steps.vars.outputs.prefix }}" \
            IMAGE_TAG="${{ steps.vars.outputs.tag }}" \
            GHCR_USERNAME="${{ github.actor }}" \
            GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            bash deploy.sh
