name: Publish Images

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set image vars
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="${FULL_SHA:0:7}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "prefix=ghcr.io/$OWNER_LC/rmg-creator-os" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}/gateway:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.prefix }}/gateway:latest

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}/dashboard:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.prefix }}/dashboard:latest
