# RMG Creator OS — control server stack (foundation).
#
# This brings up the shared backbone (Caddy, Postgres, Redis) now.
# Application services are added here as each is built — placeholders are
# listed (commented) so the wiring intent is clear.
#
# Secrets come from a sibling .env (see .env.example). Postgres and Redis are
# NOT published to the host's public interface; they are reached over the
# Tailscale tailnet and the internal Docker network only.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
      - dashboard

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rmgcreator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rmgcreator
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bind to the Tailscale IP only (set TAILSCALE_IP in .env), never 0.0.0.0.
    ports:
      - "${TAILSCALE_IP}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmgcreator -d rmgcreator"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    # Reachable by the render node over the tailnet for BullMQ jobs.
    ports:
      - "${TAILSCALE_IP}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: ${GHCR_IMAGE_PREFIX}/gateway:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgres://rmgcreator:${POSTGRES_PASSWORD}@db:5432/rmgcreator
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      GDRIVE_CLIENT_ID: ${GDRIVE_CLIENT_ID:-}
      GDRIVE_CLIENT_SECRET: ${GDRIVE_CLIENT_SECRET:-}
      GDRIVE_REFRESH_TOKEN: ${GDRIVE_REFRESH_TOKEN:-}
      GDRIVE_VIDEO_FOLDER_ID: ${GDRIVE_VIDEO_FOLDER_ID:-}
      GDRIVE_IMAGE_FOLDER_ID: ${GDRIVE_IMAGE_FOLDER_ID:-}
      GDRIVE_AUDIO_FOLDER_ID: ${GDRIVE_AUDIO_FOLDER_ID:-}
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-}
      HIGGSFIELD_ENABLED: ${HIGGSFIELD_ENABLED:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      PIXABAY_API_KEY: ${PIXABAY_API_KEY:-}
      ALLEN_URL: http://allen:8090
      ALLEN_API_KEY: ${ALLEN_API_KEY:-}
    volumes:
      # Authenticated Higgsfield CLI credentials (device-flow token), read-write
      # so the CLI can refresh its lock file.
      - ../secrets/higgsfield:/root/.config/higgsfield
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ALLEN — isolated AI scriptwriting service (PIAAR/rmg-ai). Gateway calls it at allen:8090.
  allen:
    image: ghcr.io/piaar/rmg-ai/allen:latest
    restart: unless-stopped
    environment:
      ALLEN_API_KEY: ${ALLEN_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ALLEN_VOICE_ID: ${ALLEN_VOICE_ID:-}
      GDRIVE_CLIENT_ID: ${GDRIVE_CLIENT_ID:-}
      GDRIVE_CLIENT_SECRET: ${GDRIVE_CLIENT_SECRET:-}
      GDRIVE_REFRESH_TOKEN: ${GDRIVE_REFRESH_TOKEN:-}
      GDRIVE_SCRIPTS_FOLDER_ID: ${GDRIVE_SCRIPTS_FOLDER_ID:-}
      PORT: 8090

  dashboard:
    image: ${GHCR_IMAGE_PREFIX}/dashboard:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - gateway

  # --- Future services ---
  # story-director / social-manager / allie / my-poster.
  # life-os (Python): its own image; dashboard links to its Fillout form.

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
