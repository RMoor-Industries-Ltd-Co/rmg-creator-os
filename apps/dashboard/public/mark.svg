<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MSTR Atelier vector mark</title>
  <desc id="desc">Abstract gold MSTR Atelier mark for favicon and app icon use.</desc>
  <defs>
    <linearGradient id="gold" x1="180" y1="180" x2="860" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A6421"/>
      <stop offset="0.28" stop-color="#F2D27B"/>
      <stop offset="0.56" stop-color="#C39337"/>
      <stop offset="0.78" stop-color="#FFE7A3"/>
      <stop offset="1" stop-color="#8A6421"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="192" fill="#080808"/>
  <g fill="none" stroke="url(#gold)" stroke-width="58" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
