    <path d="M780 612 C730 438 630 286 504 244" />
    <path d="M268 626 C372 575 445 464 511 339" />
    <path d="M756 626 C652 575 579 464 513 339" />
    <path d="M350 734 C438 774 586 774 674 734" stroke-width="38" />
  </g>
  <g fill="none" stroke="#FFE7A3" stroke-width="14" stroke-linecap="round" opacity="0.55">
    <path d="M256 603 C314 432 398 314 512 265" />
    <path d="M768 603 C710 432 626 314 512 265" />
  </g>
</svg>
